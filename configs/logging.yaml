version: 1
disable_existing_loggers: false
formatters:
  standard:
    format: "%(asctime)s | %(levelname)s | %(name)s | %(message)s"
handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: standard
    stream: ext://sys.stdout
root:
  level: INFO
  handlers: [console]
loggers:
  qanorm.ingestion:
    level: INFO
    handlers: [console]
    propagate: false
  qanorm.crawler:
    level: INFO
    handlers: [console]
    propagate: false
  qanorm.worker:
    level: INFO
    handlers: [console]
    propagate: false
