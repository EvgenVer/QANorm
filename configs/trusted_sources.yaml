trusted_sources:
  defaults:
    search_mode: site_query
    max_results: 5
    fetch_timeout_seconds: 6
    max_pages_per_query: 2
    extraction_strategy: generic_article
    cache_enabled: true
    search_cache_ttl_hours: 24
    page_cache_ttl_hours: 168
    extraction_cache_ttl_hours: 168
  sources:
    - source_id: minstroy_rf
      display_name: Ministry of Construction of the Russian Federation
      domain: minstroyrf.gov.ru
      base_url: https://minstroyrf.gov.ru
      language: ru
      country: RU
      trust_tier: high
      search:
        mode: site_query
        allowed_prefixes:
          - https://minstroyrf.gov.ru/docs/
          - https://minstroyrf.gov.ru/specialists/
        blocked_prefixes:
          - https://minstroyrf.gov.ru/press/
          - https://minstroyrf.gov.ru/about/
          - https://minstroyrf.gov.ru/contacts/
        query_hints:
          - разъяснение
          - методические рекомендации
          - специалистам
        max_results: 5
      fetch:
        timeout_seconds: 5
        max_pages_per_query: 1
      extract:
        strategy: generic_article
        article_selectors: []
        remove_selectors: []
      cache:
        enabled: true
        search_ttl_hours: 24
        page_ttl_hours: 168
        extraction_ttl_hours: 168
    - source_id: wbdg
      display_name: Whole Building Design Guide
      domain: www.wbdg.org
      base_url: https://www.wbdg.org
      language: en
      country: US
      trust_tier: high
      search:
        mode: site_query
        allowed_prefixes:
          - https://www.wbdg.org/
        blocked_prefixes:
          - https://www.wbdg.org/news/
          - https://www.wbdg.org/events/
          - https://www.wbdg.org/contact-us
        query_hints:
          - building design
          - criteria
          - guidance
        max_results: 5
      fetch:
        timeout_seconds: 6
        max_pages_per_query: 2
      extract:
        strategy: generic_article
        article_selectors: []
        remove_selectors: []
      cache:
        enabled: true
        search_ttl_hours: 24
        page_ttl_hours: 168
        extraction_ttl_hours: 168
