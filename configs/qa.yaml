qa:
  session:
    # Keep conversational memory scoped to the active chat session only.
    ttl_hours: 24
    summary_trigger_messages: 12
    summary_keep_recent_messages: 8
    max_parallel_queries_per_session: 1
  providers:
    # Use Gemini for runtime reasoning and synthesis, and Gemini embeddings for retrieval.
    orchestration:
      provider: gemini
      model: gemini-2.5-flash-lite
    synthesis:
      provider: gemini
      model: gemini-2.5-flash
    embeddings:
      provider: gemini
      model: gemini-embedding-001
    embedding_output_dimensions: 768
    prompt_catalog_dir: src/qanorm/prompts/templates
    prompt_default_version: v1
    prompt_versions: {}
  web:
    stream_transport: sse
    session_cookie_name: qanorm_session_id
  telegram:
    enabled: false
    use_webhook: false
    max_message_length: 3500
    long_polling_timeout_seconds: 20
    parse_mode: HTML
  search:
    open_web_provider: searxng
    open_web_max_results: 5
    trusted_domains: []
